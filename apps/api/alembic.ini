# Alembic configuration for the AI Plot Twist API.
#
# - `sqlalchemy.url` is intentionally NOT set here; env.py injects it at
#   runtime from `app.settings.get_settings().database_url`. Keeping the URL
#   out of version control avoids committing credentials.
# - `prepend_sys_path = .` (relative to this ini file) puts apps/api/ on
#   sys.path so env.py can `from app.settings import get_settings`.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
output_encoding = utf-8

# ───────────────────────────── Logging (stdlib) ─────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
