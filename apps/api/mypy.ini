[mypy]
python_version = 3.11
strict = True
plugins = sqlalchemy.ext.mypy.plugin

# ─── Per-package overrides for known stub gaps ─────────────────────────────
# asyncpg-stubs covers most of asyncpg, but the package itself lacks a py.typed
# marker so we allow the fallback.
[mypy-asyncpg.*]
ignore_missing_imports = True

# alembic ships partial stubs; suppress noise from generated env.py which
# uses alembic internals not covered by stubs.
[mypy-alembic.*]
ignore_missing_imports = True

# pywebpush + py_vapid are untyped; module 011's WebPushSender wraps the
# only call site so the gap stays narrow.
[mypy-pywebpush]
ignore_missing_imports = True

[mypy-py_vapid.*]
ignore_missing_imports = True
