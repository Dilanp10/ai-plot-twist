name: tick-23-generate

# ──────────────────────────────────────────────────────────────────────────────
# Cron schedule — DISABLED until module 003 implements the real FSM.
# To enable: uncomment the `schedule:` block and open a PR.
#
# schedule:
#   - cron: '0 2 * * *'   # 02:00 UTC = 23:00 ART (America/Argentina/Buenos_Aires, UTC-3, no DST)
#                          # Note: 23:00 ART is the NEXT calendar day in UTC.
#
# Required GitHub secrets: API_URL, TICK_SECRET
# ──────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Compute HMAC-SHA256 and POST transition
        env:
          TICK_SECRET: ${{ secrets.TICK_SECRET }}
          API_URL: ${{ secrets.API_URL }}
        run: |
          ts=$(date -u +%s)
          body=$(jq -nc \
            --arg to   "GENERACION" \
            --argjson ts "$ts" \
            --arg run  "$GITHUB_RUN_ID" \
            '{to: $to, ts: $ts, trigger_id: $run}')
          sig=$(printf '%s' "$body" | \
            openssl dgst -sha256 -hmac "$TICK_SECRET" -binary | base64)
          curl --fail --silent --show-error \
            -X POST "${API_URL}/api/v1/internal/transition" \
            -H "Content-Type: application/json" \
            -H "X-Tick-Signature: ${sig}" \
            -d "$body"
