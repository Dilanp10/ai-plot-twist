name: Live LLM smoke

# Nightly run at 02:00 UTC (before next prod cycle at 12:00 ART / 15:00 UTC).
# Also triggerable manually for on-demand key validation.
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  smoke:
    name: Live LLM smoke — Gemini + GH Models
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"

      - name: Install Python deps
        working-directory: apps/api
        run: uv sync --frozen

      - name: Run live smoke tests
        working-directory: apps/api
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # GH Actions forbids secrets starting with "GITHUB" — secret is GH_MODELS_TOKEN.
          # The provider checks both GH_MODELS_TOKEN and GITHUB_MODELS_TOKEN at test time.
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          # pydantic-settings requires DATABASE_URL and JWT_SECRET even when not connected.
          DATABASE_URL: postgresql+asyncpg://noop@localhost:5432/noop
          JWT_SECRET: live-smoke-placeholder-not-used
          ENV: test
        run: uv run pytest -m live -v
