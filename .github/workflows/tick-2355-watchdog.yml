name: tick-2355-watchdog

# 02:55 UTC = 23:55 ART (UTC-3, no DST).
# Watchdog: checks for stuck cycles and forces FAILED if needed.
# Required GitHub secrets: API_URL, TICK_SECRET

on:
  schedule:
    - cron: '55 2 * * *'
  workflow_dispatch:

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Compute HMAC-SHA256 and POST watchdog tick
        env:
          TICK_SECRET: ${{ secrets.TICK_SECRET }}
          API_URL: ${{ secrets.API_URL }}
        run: |
          ts=$(date -u +%s)
          body=$(jq -nc \
            --arg     to             "WATCHDOG" \
            --argjson ts             "$ts" \
            --arg     run            "$GITHUB_RUN_ID" \
            --argjson retry_attempt  "$GITHUB_RUN_ATTEMPT" \
            '{to: $to, ts: $ts, trigger_id: $run, retry_attempt: $retry_attempt}')
          sig=$(printf '%s' "$body" | \
            openssl dgst -sha256 -hmac "$TICK_SECRET" -binary | base64)
          curl --fail --silent --show-error \
            --retry 3 --retry-delay 10 \
            -X POST "${API_URL}/api/v1/internal/transition" \
            -H "Content-Type: application/json" \
            -H "X-Tick-Signature: ${sig}" \
            -d "$body"
